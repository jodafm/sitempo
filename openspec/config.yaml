schema: spec-driven

context: |
  Tech stack: Flutter 3.41.6, Dart 3.11.4, macOS target
  Architecture: StatefulWidget-based, models/services/screens layering
  Native bridge: Swift MethodChannel (NSStatusItem, UNUserNotificationCenter)
  Persistence: JSON files in ~/.sitempo/
  Testing: flutter_test (unit), flutter_lints (analysis)
  No state management package — vanilla StatefulWidget + Timer

strict_tdd: true

testing:
  runner:
    command: "flutter test"
    framework: flutter_test
  layers:
    unit: { available: true, tool: flutter_test }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage:
    available: true
    command: "flutter test --coverage"
  quality:
    linter: { available: true, command: "flutter analyze" }
    type_checker: { available: true, command: "flutter analyze" }
    formatter: { available: true, command: "dart format ." }

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run flutter analyze and flutter test
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
